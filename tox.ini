[tox]
envlist = py38, py39, py310, py311, lint

[gh-actions]
python =
    3.8: py38
    3.9: py39
    3.10: py310
    3.11: py311

[testenv]
setenv =
    PYTHONPATH = {toxinidir}/src
deps =
    -r{toxinidir}/requirements_dev.txt
commands =
    pip install -e .
    pytest {posargs:tests}

[testenv:lint]
deps =
    ruff>=0.1.0
    mypy>=1.0.0
commands =
    ruff check src/ tests/
    mypy src/

