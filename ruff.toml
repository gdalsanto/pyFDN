# Ruff configuration file

line-length = 88
indent-width = 4
target-version = "py310"

exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
    "*.ipynb",
]

[lint]
select = ["E", "F", "I", "N", "W", "B", "C4", "UP"]
ignore = [
    "E501",   # line too long, handled by formatter
    "E741",   # ambiguous variable name — handled manually
    "N802",   # function name should be lowercase — uppercase OK in math/DSP
    "N803",   # argument name should be lowercase — uppercase OK in math/DSP (A, B, N, …)
    "N806",   # variable in function should be lowercase — uppercase OK in math/DSP
    "N999",   # invalid module name — pyFDN uses camelCase intentionally
    "B008",   # function call in default argument — torch.tensor defaults are intentional
]
fixable = ["ALL"]
unfixable = []

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
