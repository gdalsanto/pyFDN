name: Docs CI

# Trigger automatically on push or PR + manual trigger
on:
  workflow_dispatch:      # manual trigger
  push:
    branches: [ main ]  # optional automatic build
    paths:
      - 'src/**'
      - 'docs/**'
  pull_request:
    branches: [ main ]

# Add permissions for GitHub token
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    env:
      PIP_NO_CACHE_DIR: 1

    steps:
      # Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Free disk space (torch/torchaudio in [docs] deps are large)
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false

      # Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Install system libraries required by soundfile (via flamo)
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsndfile1 pandoc graphviz

      # Install Sphinx and dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --no-cache-dir
          pip install --no-cache-dir ".[docs]" graphviz

      # Auto-generate .rst files from source
      - name: Generate Sphinx RST
        run: |
          sphinx-apidoc -o ./docs/ ./src/pyFDN  # replace with your package

      # Build the HTML documentation
      - name: Build HTML docs
        working-directory: docs
        run: make html
