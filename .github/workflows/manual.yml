name: Track Auxiliary Functions

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no changes written)"
        required: true
        type: choice
        options: ["true", "false"]
        default: "true"

permissions:
  contents: read
  issues: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (to read aux_index.json)
        uses: actions/checkout@v4

      - name: Create/Update issues from aux_index.json
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const core = require("@actions/core");
            const fs = require("fs");

            //inputs
            const DRY = (core.getInput("dry_run") || "true").toLowerCase() === "true";

            // load index file
            const INDEX_PATH = ".github/aux_index.json";
            if (!fs.existsSync(INDEX_PATH)) {
              core.setFailed(`Missing ${INDEX_PATH}.`);
              process.exit(1);
            }
            const idx = JSON.parse(fs.readFileSync(INDEX_PATH, "utf8"));
            const items = Array.isArray(idx.items) ? idx.items : [];
            if (items.length === 0) {
              core.setFailed("aux_index.json has no items.");
              process.exit(1);
            }

            // label plan
            const baseLabels = ["phase:1"]; // always apply
            const ensureLabels = async (names) => {
              const existing = await github.paginate(
                github.rest.issues.listLabelsForRepo,
                { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
              );
              const need = names.filter(n => !existing.find(e => e.name.toLowerCase() === n.toLowerCase()));
              if (DRY) {
                if (need.length) console.log("(dry) would create labels:", need.join(", "));
                return;
              }
              for (const n of need) {
                const colour =
                  n.startsWith("status:") ? "6ea04b" :
                  n === "priority:high" ? "b60205" :
                  n.startsWith("area:") || n.startsWith("module:") ? "1d76db" :
                  "ededed";
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo, name: n, color: colour
                });
                console.log("created label:", n);
              }
            };

            // helpers
            const toAreaLabels = (matlab, python) => {
              const s = `${matlab} ${python}`.toLowerCase();
              return s.includes("poly") ? ["area:polynomial", "module:auxiliary"] : ["area:auxiliary"];
            };
            const statusLabel = (status) =>
              (String(status || "").toLowerCase() === "done") ? "status:done" : "status:todo";

            const findIssueByTitle = async (title) => {
              const q = `repo:${context.repo.owner}/${context.repo.repo} is:issue in:title "${title}"`;
              const res = await github.rest.search.issuesAndPullRequests({ q });
              return res.data.items.find(i => i.title === title);
            };

            const makeBody = ({ matlab, python, status }) => {
              const done = String(status || "").toLowerCase() === "done";
              const lines = [
                `**MATLAB:** ${matlab}`,
                `**Python:** ${python}`,
                "",
                `**Status:** ${done ? "✅ Complete" : "⏳ To Do"}`,
                "",
                `**Attribution:** From Sebastian J. Schlecht's FDN Toolbox`,
                `**Workflow author:** Facundo Franchino`,
                "",
                "### Checklist",
                `${done ? "- [x]" : "- [ ]"} Unit tests cover typical and edge cases`,
                `${done ? "- [x]" : "- [ ]"} Behaviour matches MATLAB output within tolerance`,
                `${done ? "- [x]" : "- [ ]"} Docstring with usage example`
              ];
              return lines.join("\n");
            };

            // make sure core labels exist 
            const allLabelNames = new Set(baseLabels.concat([
              "area:auxiliary", "area:polynomial", "module:auxiliary",
              "priority:high", "status:done", "status:todo"
            ]));
            await ensureLabels([...allLabelNames]);

            // iterate items
            let total = 0, doneCount = 0, todoCount = 0, created = 0, updated = 0, skipped = 0;

            for (const it of items) {
              const matlab = it.matlab;
              const python = it.python;
              const status = String(it.status || "todo").toLowerCase();
              if (!matlab || !python) { console.log("skip invalid entry:", it); skipped++; continue; }

              const title = `Aux: ${matlab} to ${python}`;
              const labels = [
                ...baseLabels,
                ...toAreaLabels(matlab, python),
                "priority:high",
                statusLabel(status)
              ];

              const body = makeBody({ matlab, python, status });

              //idempotent search
              const hit = await findIssueByTitle(title);

              if (DRY) {
                console.log(`(dry) ${hit ? "would update" : "would create"}: "${title}" with labels [${labels.join(", ")}]`);
              } else {
                if (hit) {
                  await github.rest.issues.update({
                    owner: context.repo.owner, repo: context.repo.repo,
                    issue_number: hit.number,
                    title, body, labels
                  });
                  console.log(`updated #${hit.number}: ${title}`);
                  updated++;
                } else {
                  const createdIssue = await github.rest.issues.create({
                    owner: context.repo.owner, repo: context.repo.repo,
                    title, body, labels
                  });
                  console.log(`created #${createdIssue.data.number}: ${title}`);
                  created++;
                }
              }

              total++;
              if (status === "done") doneCount++; else todoCount++;
            }

            const progress = total ? Math.round((doneCount / total) * 100) : 0;

            console.log("---- Summary ----");
            console.log(`Total functions: ${total}`);
            console.log(`Completed:       ${doneCount}`);
            console.log(`To do:           ${todoCount}`);
            console.log(`Progress:        ${progress}%`);

            //also emit as outputs (useful if you ever chain jobs)
            core.setOutput("total", String(total));
            core.setOutput("completed", String(doneCount));
            core.setOutput("todo", String(todoCount));
            core.setOutput("progress_percent", String(progress));
